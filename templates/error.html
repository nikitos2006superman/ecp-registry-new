{% extends 'base.html' %}
{% block title %}Ошибка {{ code }}{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-code">{{ code }}</div>
    <div class="error-message">{{ message }}</div>
    <p style="margin-top: 20px;"><a href="{{ url_for('dashboard') }}" class="btn btn-primary">На главную</a></p>
</div>
{% endblock %}

{% block content_anon %}
<div class="error-page">
    <div class="error-code">{{ code }}</div>
    <div class="error-message">{{ message }}</div>
</div>
{% endblock %}
